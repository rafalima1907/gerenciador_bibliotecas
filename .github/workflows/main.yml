name: CI Quality Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Permitir execução do Maven Wrapper
        run: chmod +x mvnw

      
      - name: Rodar Testes, JaCoCo e SonarQube
        run: |
          ./mvnw -B -ntp clean verify sonar:sonar \
          -Dsonar.projectKey=SEU_PROJETO_AQUI \
          -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   

      - name: Upload relatórios de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-and-failsafe-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            
      - name: Upload relatório de cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/