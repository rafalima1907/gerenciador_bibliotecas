<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biblioteca Pessoal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eeeae8;
      --surface: #fffefe;
      --surface-soft: #f7f4f2;
      --ink: #17110f;
      --muted: #8b746c;
      --muted-2: #b7a7a2;
      --line: #b89b91;
      --brand: #4b2d25;
      --brand-dark: #3a201a;
      --accent: #527f8e;
      --danger: #9b3d32;
      --shadow: 0 18px 38px rgba(58, 32, 26, 0.08);
      --sidebar: 48px;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 36px;
      border: 0;
      border-radius: 7px;
      padding: 0 16px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(82, 127, 142, 0.32);
      outline-offset: 2px;
    }

    button.secondary {
      background: var(--accent);
    }

    button.ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--brand);
    }

    button.danger {
      background: var(--danger);
    }

    input,
    textarea {
      width: 100%;
      border: 0;
      border-bottom: 2px solid var(--line);
      background: transparent;
      color: var(--ink);
      padding: 9px 4px 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1rem;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      line-height: 1.35;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted-2);
      opacity: 1;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--ink);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    .app {
      min-height: 100vh;
      padding-left: var(--sidebar);
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 20;
      width: var(--sidebar);
      background: var(--brand);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-right: 1px solid rgba(255, 255, 255, 0.18);
    }

    .logo {
      width: 100%;
      min-height: 46px;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
    }

    .nav {
      width: 100%;
      display: grid;
      gap: 12px;
      margin-top: auto;
      margin-bottom: auto;
      padding: 12px 0;
    }

    .nav-bottom {
      margin-top: auto;
      margin-bottom: 12px;
    }

    .nav-button {
      width: 100%;
      min-height: 38px;
      border-radius: 0;
      padding: 0;
      background: transparent;
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 1rem;
    }

    .nav-button:hover,
    .nav-button.active {
      background: rgba(255, 255, 255, 0.12);
    }

    .page {
      min-height: 100vh;
      padding: 36px clamp(20px, 6vw, 96px);
    }

    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .auth-card {
      width: min(100%, 330px);
      background: var(--surface);
      border-radius: 42px;
      padding: 44px 38px 36px;
      box-shadow: var(--shadow);
    }

    .auth-card h1,
    .view-title {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 3.9rem);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0;
    }

    .auth-card h1 {
      margin-bottom: 24px;
      text-align: center;
      font-size: clamp(2rem, 8vw, 2.75rem);
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .auth-actions {
      justify-content: center;
      padding-top: 10px;
    }

    .message {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 0.95rem;
    }

    .message.error {
      color: var(--danger);
    }

    .top-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 26px;
    }

    .back-button {
      width: 40px;
      min-width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      background: transparent;
      color: var(--brand);
      border: 1px solid transparent;
      font-size: 2rem;
      line-height: 1;
      font-family: Arial, sans-serif;
    }

    .back-button:hover {
      background: rgba(75, 45, 37, 0.08);
    }

    .search-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 22px;
      margin-bottom: 16px;
    }

    .search-input {
      font-size: 1.25rem;
      color: var(--muted);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 34px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 14px;
      background: var(--brand);
      color: #fff;
      font-family: "Courier New", monospace;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .chip.accent {
      background: var(--accent);
    }

    .book-list {
      display: grid;
      gap: 10px;
    }

    .book-card {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      padding: 18px 20px;
      box-shadow: none;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      text-align: left;
      cursor: default;
    }

    .book-card:hover {
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(58, 32, 26, 0.08);
    }

    .book-title {
      margin: 0 0 8px;
      font-size: clamp(1.15rem, 2.6vw, 1.45rem);
      font-weight: 400;
    }

    .book-meta,
    .book-copy {
      margin: 0;
      line-height: 1.35;
      font-size: 0.96rem;
    }

    .book-copy {
      margin-top: 14px;
      max-width: 76ch;
    }

    .book-stats {
      min-width: 132px;
      text-align: right;
      font-size: 0.9rem;
      line-height: 1.2;
    }

    .card-actions {
      grid-column: 1 / -1;
      justify-content: center;
    }

    .empty-state {
      min-height: 160px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .detail-main {
      max-width: 720px;
    }

    .detail-block {
      margin-top: 18px;
    }

    .detail-label {
      margin: 0 0 8px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .form-page {
      max-width: 900px;
    }

    .book-form {
      width: min(100%, 470px);
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    .form-save {
      margin-left: auto;
    }

    @media (max-width: 860px) {
      :root {
        --sidebar: 0px;
      }

      .app {
        padding-left: 0;
        padding-bottom: 68px;
      }

      .sidebar {
        inset: auto 0 0 0;
        width: auto;
        height: 64px;
        flex-direction: row;
        border-right: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.18);
      }

      .logo {
        width: 62px;
        min-height: 64px;
        font-size: 1.25rem;
      }

      .nav,
      .nav-bottom {
        width: auto;
        display: flex;
        margin: 0;
        padding: 0;
        gap: 0;
      }

      .nav {
        flex: 1;
        justify-content: center;
      }

      .nav-button {
        width: 52px;
        min-height: 64px;
      }

      .page {
        padding: 28px 18px;
      }

      .auth-page {
        padding: 28px 18px 92px;
        place-items: center;
      }

      .auth-card {
        border-radius: 30px;
        padding: 34px 26px 28px;
      }

      .top-row,
      .search-row {
        gap: 12px;
      }

      .search-row {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .book-card {
        grid-template-columns: 1fr;
      }

      .book-stats {
        min-width: 0;
        text-align: left;
      }

      .card-actions {
        justify-content: flex-start;
      }

      .form-save {
        width: auto;
        margin-left: 0;
      }
    }

    @media (max-width: 520px) {
      .auth-card h1,
      .view-title {
        font-size: 2.25rem;
      }

      .top-row {
        align-items: center;
      }

      .actions button:not(.nav-button):not(.back-button) {
        flex: 1 1 130px;
      }

      .book-form {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Navegacao principal">
      <div class="logo" aria-label="Biblioteca Pessoal">BP</div>
      <nav class="nav">
        <button id="navBooks" class="nav-button active" type="button" aria-label="Livros">L</button>
        <button id="navNew" class="nav-button" type="button" aria-label="Novo livro">+</button>
      </nav>
      <div class="nav-bottom">
        <button id="navSession" class="nav-button" type="button" aria-label="Sair">S</button>
      </div>
    </aside>

    <main>
      <section id="authView" class="auth-page">
        <div class="auth-card stack">
          <h1>Login</h1>
          <form id="authForm" class="stack">
            <label>
              Nome
              <input id="nome" autocomplete="name" maxlength="80" placeholder="Nome">
            </label>
            <label>
              E-mail
              <input id="email" type="email" autocomplete="email" required placeholder="E-mail">
            </label>
            <label>
              Senha
              <input id="senha" type="password" autocomplete="current-password" minlength="8" required placeholder="Senha">
            </label>
            <div class="actions auth-actions">
              <button id="loginButton" type="submit">Entrar</button>
              <button id="registerButton" class="secondary" type="button">Cadastrar</button>
            </div>
          </form>
          <p id="authMessage" class="message" role="status"></p>
        </div>
      </section>

      <section id="listView" class="page hidden">
        <div class="search-row">
          <button id="refreshButton" class="back-button" type="button" aria-label="Atualizar livros">&#8249;</button>
          <input id="searchInput" class="search-input" placeholder="Nome ou autor do Livro" aria-label="Buscar livro">
          <div class="actions search-actions">
            <button id="newBookButton" type="button">Novo</button>
          </div>
        </div>
        <div id="booksBody" class="book-list" aria-live="polite"></div>
        <p id="bookMessage" class="message" role="status"></p>
      </section>

      <section id="detailView" class="page hidden">
        <div class="top-row">
          <button id="detailBackButton" class="back-button" type="button" aria-label="Voltar">&#8249;</button>
          <div class="actions">
            <button id="detailEditButton" type="button">Editar</button>
            <button id="detailDeleteButton" class="danger" type="button">Excluir</button>
          </div>
        </div>
        <article class="detail-main">
          <h1 id="detailTitle" class="view-title"></h1>
          <div class="detail-block">
            <p class="detail-label">Autor</p>
            <div id="detailAuthors" class="chip-row"></div>
          </div>
          <div class="detail-block">
            <p class="detail-label">ISBN</p>
            <div id="detailIsbn" class="chip-row"></div>
          </div>
          <div class="detail-block">
            <p class="detail-label">Descricao</p>
            <p id="detailDescription" class="book-copy"></p>
          </div>
        </article>
      </section>

      <section id="formView" class="page form-page hidden">
        <div class="top-row">
          <div class="actions">
            <button id="formBackButton" class="back-button" type="button" aria-label="Voltar">&#8249;</button>
            <h1 id="formTitle" class="view-title">Novo Livro</h1>
          </div>
          <button id="formSaveButton" class="form-save" type="submit" form="bookForm">Salvar</button>
        </div>
        <form id="bookForm" class="book-form form-grid">
          <input id="bookId" type="hidden">
          <label>
            Titulo
            <input id="titulo" required maxlength="120" placeholder="Titulo">
          </label>
          <label>
            Autor
            <input id="autor" required maxlength="120" placeholder="Autor">
          </label>
          <label>
            ISBN
            <input id="isbn" required placeholder="9788580555332">
          </label>
          <label>
            Descricao
            <textarea id="descricao" maxlength="360" placeholder="Descricao breve do livro"></textarea>
          </label>
        </form>
        <p id="formMessage" class="message" role="status"></p>
      </section>
    </main>
  </div>

  <script>
    const views = {
      auth: document.querySelector("#authView"),
      list: document.querySelector("#listView"),
      detail: document.querySelector("#detailView"),
      form: document.querySelector("#formView")
    };

    const authMessage = document.querySelector("#authMessage");
    const bookMessage = document.querySelector("#bookMessage");
    const formMessage = document.querySelector("#formMessage");
    const booksBody = document.querySelector("#booksBody");
    const searchInput = document.querySelector("#searchInput");
    const navBooks = document.querySelector("#navBooks");
    const navNew = document.querySelector("#navNew");
    const navSession = document.querySelector("#navSession");

    const jsonHeaders = { "Content-Type": "application/json" };
    const descriptions = new Map(JSON.parse(localStorage.getItem("bookDescriptions") || "[]"));
    let books = [];
    let currentUser = null;
    let selectedBook = null;

    async function request(url, options = {}) {
      const response = await fetch(url, {
        credentials: "same-origin",
        headers: jsonHeaders,
        ...options
      });
      const text = await response.text();
      const body = text ? JSON.parse(text) : null;

      if (!response.ok) {
        const message = body?.erro || Object.values(body || {}).join(", ") || "Falha na operacao";
        throw new Error(message);
      }

      return body;
    }

    function setMessage(element, text = "", isError = false) {
      element.textContent = text;
      element.classList.toggle("error", isError);
    }

    function showView(name) {
      Object.entries(views).forEach(([key, element]) => {
        element.classList.toggle("hidden", key !== name);
      });
      navBooks.classList.toggle("active", name === "list" || name === "detail");
      navNew.classList.toggle("active", name === "form" && !document.querySelector("#bookId").value);
    }

    function requireSession() {
      if (!currentUser) {
        showView("auth");
        return false;
      }
      return true;
    }

    function authPayload() {
      return {
        nome: document.querySelector("#nome").value.trim(),
        email: document.querySelector("#email").value.trim(),
        senha: document.querySelector("#senha").value
      };
    }

    function bookPayload() {
      return {
        titulo: document.querySelector("#titulo").value.trim(),
        autor: document.querySelector("#autor").value.trim(),
        isbn: document.querySelector("#isbn").value.trim()
      };
    }

    function getDescription(book) {
      return descriptions.get(book.id) || "Livro cadastrado na biblioteca pessoal. Use a edicao para atualizar titulo, autor, ISBN e uma descricao de apoio para a apresentacao.";
    }

    function saveDescription(id, value) {
      if (!id) {
        return;
      }
      const cleanValue = value.trim();
      if (cleanValue) {
        descriptions.set(id, cleanValue);
      } else {
        descriptions.delete(id);
      }
      localStorage.setItem("bookDescriptions", JSON.stringify(Array.from(descriptions.entries())));
    }

    function chipsFor(text, target) {
      target.innerHTML = "";
      String(text || "")
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean)
        .forEach((item) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = item;
          target.appendChild(chip);
        });
    }

    function filteredBooks() {
      const term = searchInput.value.trim().toLowerCase();
      if (!term) {
        return books;
      }
      return books.filter((book) => {
        const searchable = `${book.titulo} ${book.autor} ${book.isbn}`.toLowerCase();
        return searchable.includes(term);
      });
    }

    function renderBooks() {
      booksBody.innerHTML = "";
      const visibleBooks = filteredBooks();

      if (!visibleBooks.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = books.length ? "Nenhum livro encontrado." : "Nenhum livro cadastrado.";
        booksBody.appendChild(empty);
        return;
      }

      visibleBooks.forEach((book) => {
        const card = document.createElement("article");
        card.className = "book-card";

        const content = document.createElement("div");
        const title = document.createElement("h2");
        const meta = document.createElement("p");
        const description = document.createElement("p");

        title.className = "book-title";
        title.textContent = book.titulo;
        meta.className = "book-meta";
        meta.textContent = `${book.autor} - ISBN ${book.isbn}`;
        description.className = "book-copy";
        description.textContent = getDescription(book);

        content.append(title, meta, description);

        const stats = document.createElement("div");
        stats.className = "book-stats";
        stats.innerHTML = "<strong>Exemplares:</strong> 1";

        const actions = document.createElement("div");
        actions.className = "actions card-actions";

        const viewButton = document.createElement("button");
        viewButton.type = "button";
        viewButton.textContent = "Visualizar";
        viewButton.addEventListener("click", () => openDetail(book));

        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.textContent = "Editar";
        editButton.addEventListener("click", () => openForm(book));

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "danger";
        deleteButton.textContent = "Excluir";
        deleteButton.addEventListener("click", () => deleteBook(book.id));

        actions.append(viewButton, editButton, deleteButton);
        card.append(content, stats, actions);
        booksBody.appendChild(card);
      });
    }

    async function loadBooks() {
      if (!requireSession()) {
        return;
      }
      setMessage(bookMessage);
      try {
        books = await request("/api/livros");
        renderBooks();
      } catch (error) {
        setMessage(bookMessage, error.message, true);
      }
    }

    function showApp(user) {
      currentUser = user;
      navSession.setAttribute("aria-label", `Sair de ${user.nome}`);
      showView("list");
      loadBooks();
    }

    function showAuth() {
      currentUser = null;
      navSession.setAttribute("aria-label", "Sessao");
      showView("auth");
    }

    function openDetail(book) {
      selectedBook = book;
      document.querySelector("#detailTitle").textContent = book.titulo;
      chipsFor(book.autor, document.querySelector("#detailAuthors"));
      chipsFor(book.isbn, document.querySelector("#detailIsbn"));
      document.querySelector("#detailDescription").textContent = getDescription(book);
      showView("detail");
    }

    function openForm(book = null) {
      if (!requireSession()) {
        return;
      }

      selectedBook = book;
      document.querySelector("#bookId").value = book?.id || "";
      document.querySelector("#titulo").value = book?.titulo || "";
      document.querySelector("#autor").value = book?.autor || "";
      document.querySelector("#isbn").value = book?.isbn || "";
      document.querySelector("#descricao").value = book ? getDescription(book) : "";
      document.querySelector("#formTitle").textContent = book ? "Editar Livro" : "Novo Livro";
      setMessage(formMessage);
      showView("form");
    }

    async function deleteBook(id) {
      if (!confirm("Excluir este livro?")) {
        return;
      }
      try {
        await fetch(`/api/livros/${id}`, { method: "DELETE", credentials: "same-origin" });
        descriptions.delete(id);
        localStorage.setItem("bookDescriptions", JSON.stringify(Array.from(descriptions.entries())));
        setMessage(bookMessage, "Livro excluido.");
        await loadBooks();
        showView("list");
      } catch (error) {
        setMessage(bookMessage, error.message, true);
      }
    }

    document.querySelector("#authForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const { email, senha } = authPayload();
        const user = await request("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, senha })
        });
        setMessage(authMessage);
        showApp(user);
      } catch (error) {
        setMessage(authMessage, error.message, true);
      }
    });

    document.querySelector("#registerButton").addEventListener("click", async () => {
      try {
        const user = await request("/api/auth/register", {
          method: "POST",
          body: JSON.stringify(authPayload())
        });
        setMessage(authMessage);
        showApp(user);
      } catch (error) {
        setMessage(authMessage, error.message, true);
      }
    });

    document.querySelector("#bookForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const id = document.querySelector("#bookId").value;
      const method = id ? "PUT" : "POST";
      const url = id ? `/api/livros/${id}` : "/api/livros";
      const description = document.querySelector("#descricao").value;

      try {
        const saved = await request(url, { method, body: JSON.stringify(bookPayload()) });
        saveDescription(saved.id, description);
        setMessage(formMessage, "Livro salvo.");
        await loadBooks();
        openDetail(saved);
      } catch (error) {
        setMessage(formMessage, error.message, true);
      }
    });

    document.querySelector("#detailBackButton").addEventListener("click", () => showView("list"));
    document.querySelector("#formBackButton").addEventListener("click", () => showView(selectedBook ? "detail" : "list"));
    document.querySelector("#detailEditButton").addEventListener("click", () => openForm(selectedBook));
    document.querySelector("#detailDeleteButton").addEventListener("click", () => selectedBook && deleteBook(selectedBook.id));
    document.querySelector("#newBookButton").addEventListener("click", () => openForm());
    document.querySelector("#refreshButton").addEventListener("click", loadBooks);
    searchInput.addEventListener("input", renderBooks);
    navBooks.addEventListener("click", () => {
      if (requireSession()) {
        showView("list");
        loadBooks();
      }
    });
    navNew.addEventListener("click", () => openForm());
    navSession.addEventListener("click", async () => {
      if (!currentUser) {
        showAuth();
        return;
      }
      await fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" });
      showAuth();
    });

    request("/api/auth/me").then(showApp).catch(showAuth);
  </script>
</body>
</html>
